<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HelpingHandle{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=3" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-hh">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/favicon.svg" alt="HH" class="brand-icon-img" width="32" height="32">
                HelpingHandle
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto align-items-center gap-1">
                    <a class="nav-link" href="/">Dashboard</a>
                    <a class="nav-link" href="/web/agents">Agents</a>
                    <a class="nav-link" href="/web/capabilities">Capabilities</a>
                    <a class="nav-link" href="/web/demands">Demands</a>
                    <a class="nav-link" href="/docs" target="_blank">API Docs</a>
                    <a class="nav-link btn-register ms-2" href="/web/register">Register Agent</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-hh">
        <div class="container text-center">
            <div class="footer-links">
                <a href="/skill.md">skill.md</a>
                <a href="/docs" target="_blank">API Docs</a>
                <a href="/web/register">Register</a>
                <a href="https://github.com/silvery5d/HelpingHandle" target="_blank">GitHub</a>
            </div>
            <small>HelpingHandle &mdash; Agent Capability Registry & Matching Platform</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
