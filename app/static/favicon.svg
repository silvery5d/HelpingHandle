<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — healthy green -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Left gear (larger, 8 teeth) -->
  <g transform="translate(22,24)">
    <!-- Gear teeth -->
    <path d="
      M-1.5,-11.5 L1.5,-11.5 L2,-9.5 A9.5,9.5 0 0,1 4.5,-8.5 L6.2,-10 L8.3,-7.9 L6.8,-6.2
      A9.5,9.5 0 0,1 7.8,-3.7 L10,-3.2 L10,-0.2 L7.8,0.3 A9.5,9.5 0 0,1 6.8,2.8 L8.3,4.5
      L6.2,6.6 L4.5,5.1 A9.5,9.5 0 0,1 2,6.1 L1.5,8.1 L-1.5,8.1 L-2,6.1
      A9.5,9.5 0 0,1 -4.5,5.1 L-6.2,6.6 L-8.3,4.5 L-6.8,2.8 A9.5,9.5 0 0,1 -7.8,0.3
      L-10,-0.2 L-10,-3.2 L-7.8,-3.7 A9.5,9.5 0 0,1 -6.8,-6.2 L-8.3,-7.9 L-6.2,-10
      L-4.5,-8.5 A9.5,9.5 0 0,1 -2,-9.5 Z"
      fill="white" opacity="0.95"/>
    <!-- Gear center hole -->
    <circle cx="0" cy="-1.7" r="3.8" fill="url(#bg)"/>
    <!-- Center dot -->
    <circle cx="0" cy="-1.7" r="1.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Right gear (smaller, 6 teeth) -->
  <g transform="translate(43.5,38)">
    <path d="
      M-1.2,-8.5 L1.2,-8.5 L1.6,-7 A7,7 0 0,1 3.5,-6 L4.8,-7.2 L6.4,-5.6 L5.2,-4.3
      A7,7 0 0,1 5.8,-2.2 L7.3,-1.8 L7.3,0.2 L5.8,0.6 A7,7 0 0,1 5.2,2.7 L6.4,4
      L4.8,5.6 L3.5,4.4 A7,7 0 0,1 1.6,5.4 L1.2,6.9 L-1.2,6.9 L-1.6,5.4
      A7,7 0 0,1 -3.5,4.4 L-4.8,5.6 L-6.4,4 L-5.2,2.7 A7,7 0 0,1 -5.8,0.6
      L-7.3,0.2 L-7.3,-1.8 L-5.8,-2.2 A7,7 0 0,1 -5.2,-4.3 L-6.4,-5.6 L-4.8,-7.2
      L-3.5,-6 A7,7 0 0,1 -1.6,-7 Z"
      fill="white" opacity="0.9"/>
    <circle cx="0" cy="-0.8" r="2.8" fill="url(#bg)"/>
    <circle cx="0" cy="-0.8" r="1.2" fill="white" opacity="0.7"/>
  </g>

  <!-- Connecting shaft between the two gears -->
  <line x1="27" y1="27" x2="39" y2="34" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Shaft pivot nodes -->
  <circle cx="27" cy="27" r="2" fill="white"/>
  <circle cx="39" cy="34" r="2" fill="white"/>
</svg>
